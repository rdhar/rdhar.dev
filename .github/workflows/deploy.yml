---
name: Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  Build:
    runs-on: ubuntu-24.04

    concurrency:
      cancel-in-progress: true
      group: ${{ github.workflow }}-${{ github.ref }}

    steps:
      - &checkout
        name: Checkout branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - &setup-bun
        name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - &cache-deps
        name: Cache dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - &install-deps
        name: Install dependencies
        run: bun install --frozen-lockfile

      - &build-project
        name: Build project
        run: bun run build

      - name: Upload to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist
          retention-days: 1

  Deploy:
    if: github.event_name != 'pull_request'
    needs: Build
    runs-on: ubuntu-24.04

    permissions:
      id-token: write # Required for authenticating GitHub Pages.
      pages: write # Required for publishing to GitHub Pages.

    concurrency:
      cancel-in-progress: true
      group: github-pages

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          preview: true

  Publish:
    if: github.event_name != 'pull_request'
    needs: Build
    runs-on: ubuntu-24.04

    permissions:
      contents: write # Required for creating release tags.

    concurrency:
      cancel-in-progress: true
      group: ${{ github.workflow }}-${{ github.ref }}-publish

    steps:
      - *checkout
      - *setup-bun
      - *cache-deps
      - *install-deps
      - *build-project

      - name: Upload to web server
        env:
          SSHHOST: ${{ secrets.SSH_HOST }}
          SSHPASS: ${{ secrets.SSH_PASS }}
          SSHPORT: ${{ secrets.SSH_PORT }}
          SSHUSER: ${{ secrets.SSH_USER }}
          TARGET: ~/domains/www.rdhar.dev/public_html/
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -p $SSHPORT $SSHUSER@$SSHHOST "rm -rf $TARGET*"
          sshpass -e scp -o StrictHostKeyChecking=no -P $SSHPORT -r dist/. $SSHUSER@$SSHHOST:$TARGET

      - name: Create release tag
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          DATETIME=$(date +'%Y.%m.%d-%H.%M') # Format: YYYY.MM.DD-HH.mm
          tar -czf dist.tar.gz -C dist .
          gh release create "v$DATETIME" --generate-notes 'dist.tar.gz#rdhar.dev'
          echo "View release tag: https://github.com/$GH_REPO/releases/tag/v$DATETIME" >> $GITHUB_STEP_SUMMARY
